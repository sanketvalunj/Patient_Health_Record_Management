services:
  - type: web
    name: kasukabe-ehr-frontend
    env: node
    rootDir: new_frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_THIRDWEB_CLIENT_ID
        sync: false
      - key: PINATA_API_KEY
        sync: false
      - key: PINATA_SECRET_API_KEY
        sync: false
      - key: PINATA_JWT
        sync: false
      - key: NEXT_PUBLIC_EHR_REGISTRY_ADDRESS
        sync: false
      - key: NEXT_PUBLIC_EHR_ACCESS_ADDRESS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
